name: Update Stock Dict for RIME

on:
  schedule:
    - cron: '0 2 * * 1'  # 每周一 UTC 02:00（北京时间 10:00）运行
  workflow_dispatch:       # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install akshare pypinyin

      - name: Generate dict
        run: python scripts/generate_dict.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dict/stock.dict.yaml
          git diff --cached --quiet || git commit -m "chore: update A-stock dict $(date +'%Y-%m-%d')"
          git push
